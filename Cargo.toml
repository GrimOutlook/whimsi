[package]
name = "msipmbuild"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.98"
camino = "1.1.9"
clap = { version = "4.5.34", features = ["derive"] }
cli-table = "0.5.0"
derive-new = "0.7.0"
flexstr = { version = "0.9.2", features = ["serde"] }
getset = "0.1.5"
itertools = "0.14.0"
msi = "0.9.0"
serde = { version = "1.0.219", features = ["derive"] }
toml = "0.9.3"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
uuid = { version = "1.16.0", features = ["v4"] }

[dev-dependencies]
test-case = "3.3.1"
